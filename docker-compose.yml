services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-local-access-key}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-local-secret-key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30

  api:
    build:
      context: .
    environment:
      PUBLIC_API_PREFIX: /api/v1
      PUBLIC_API_PORT: 8000
      SERVICE_DB_URL: sqlite+aiosqlite:///./data/storage.db
      S3_HOST: minio
      S3_PORT: 9000
      S3_REGION: us-east-1
      S3_SECURE: "False"
      S3_VERIFY_CERTIFICATES: "False"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-local-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-local-secret-key}
      S3_BUCKET: versioned-storage
      LOG_LEVEL: INFO
      NUMBER_OF_WORKERS: 1
    ports:
      - "8000:8000"
    volumes:
      - service_data:/opt/data
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/api/v1/health')
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  minio_data:
  service_data:
